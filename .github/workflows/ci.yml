# CI for tabcall-app: install, typecheck, unit-test on every push and PR.
#
# We deliberately don't run \`next build\` here — it requires a populated
# DATABASE_URL because of the strict env validation in lib/env.ts. Build
# verification happens on Vercel's preview deploys, which inject the prod
# secrets. Adding the same secrets to GitHub Actions is overkill for a
# sub-second smoke check.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app:
    name: app — typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client (typecheck needs the generated types)
        run: bun run db:generate

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test src/lib/__tests__
